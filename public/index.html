<!DOCTYPE html>
<html>
<head>
  <title>Video Call</title>
  <style>
    #incomingCall {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: white;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>Video Call App</h2>

<!-- ROOM UI -->
<button id="createRoomBtn">Create Room</button>
<button id="copyLinkBtn">Copy Invite Link</button>
<p id="roomInfo">No room yet</p>

<p id="userCount">Users in room: 0</p>

<!-- VIDEO -->
<video id="localVideo" autoplay playsinline muted style="width:45%;"></video>
<video id="remoteVideo" autoplay playsinline style="width:45%;"></video>
<audio id="remoteAudio" autoplay></audio>

<br><br>

<button id="callBtn">Start Call</button>
<button id="micBtn">Mute Mic</button>
<button id="camBtn">Turn Camera Off</button>

<!-- INCOMING CALL POPUP -->
<div id="incomingCall">
  <p>Incoming Call...</p>
  <button id="acceptBtn">Accept</button>
  <button id="rejectBtn">Reject</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
/* =========================
   ROOM SYSTEM
========================= */
let roomId = window.location.pathname.split("/")[2];

const socket = io({
  query: { roomId }
});

/* =========================
   UI ELEMENTS
========================= */
const createRoomBtn = document.getElementById("createRoomBtn");
const copyLinkBtn = document.getElementById("copyLinkBtn");
const roomInfo = document.getElementById("roomInfo");
const userCount = document.getElementById("userCount");

const incomingCallBox = document.getElementById("incomingCall");
const acceptBtn = document.getElementById("acceptBtn");
const rejectBtn = document.getElementById("rejectBtn");

const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");
const remoteAudio = document.getElementById("remoteAudio");

const callBtn = document.getElementById("callBtn");
const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");

/* =========================
   STATE
========================= */
let localStream;
let peerConnection;

let micEnabled = true;
let camEnabled = true;

/* =========================
   ICE CONFIG
========================= */
const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

/* =========================
   CREATE ROOM
========================= */
createRoomBtn.onclick = () => {
  const newRoom = Math.random().toString(36).substring(2, 8);
  window.location.href = `/room/${newRoom}`;
};

/* =========================
   COPY LINK
========================= */
copyLinkBtn.onclick = () => {
  const link = window.location.href;
  navigator.clipboard.writeText(link);
  alert("Invite link copied!");
};

/* =========================
   INIT MEDIA
========================= */
async function init() {
  if (peerConnection) return;

  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  localVideo.srcObject = localStream;

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = (event) => {
    const stream = event.streams[0];
    remoteVideo.srcObject = stream;
    remoteAudio.srcObject = stream;
  };

  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", event.candidate);
    }
  };
}

/* =========================
   CALL BUTTON
========================= */
callBtn.onclick = async () => {
  await init();

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  socket.emit("offer", offer);
};

/* =========================
   MIC / CAM
========================= */
micBtn.onclick = () => {
  const track = localStream.getAudioTracks()[0];
  micEnabled = !micEnabled;
  track.enabled = micEnabled;
};

camBtn.onclick = () => {
  const track = localStream.getVideoTracks()[0];
  camEnabled = !camEnabled;
  track.enabled = camEnabled;
};

/* =========================
   INCOMING CALL (UI)
========================= */
socket.on("offer", async (offer) => {
  await init();

  incomingCallBox.style.display = "block";

  acceptBtn.onclick = async () => {
    incomingCallBox.style.display = "none";

    await peerConnection.setRemoteDescription(offer);

    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    socket.emit("answer", answer);
  };

  rejectBtn.onclick = () => {
    incomingCallBox.style.display = "none";
  };
});

/* ANSWER */
socket.on("answer", async (answer) => {
  await peerConnection.setRemoteDescription(answer);
});

/* ICE */
socket.on("ice-candidate", async (candidate) => {
  try {
    await peerConnection.addIceCandidate(candidate);
  } catch (e) {
    console.error(e);
  }
});

/* =========================
   USER COUNT
========================= */
socket.on("room-users", (count) => {
  userCount.innerText = `Users in room: ${count}`;
});
</script>

</body>
</html>
