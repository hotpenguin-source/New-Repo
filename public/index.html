<!DOCTYPE html>
<html>
<head>
  <title>Our Quiet Place</title>

  <style>
    #localVideo { transform: scaleX(-1); }

    #localWrapper, #remoteWrapper {
      position: relative;
      display: inline-block;
      width: 45%;
    }

    video {
      width: 100%;
      transition: opacity 0.3s ease;
    }

    .placeholder {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: black;
    }

    /* KEEP YOUR ORIGINAL OVAL */
    .placeholder img {
      width: 40%;
      height: 40%;
      object-fit: cover;
      border-radius: 50%;
    }

    .mute-indicator {
      position: absolute;
      top: 10px; right: 10px;
      width: 70px; height: 70px;
      border-radius: 50%;
      overflow: hidden;
      display: none;
      background: black;
    }

    .mute-indicator img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .control-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 4px solid white;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }

    .control-btn.off { border-color: yellow; }

    .control-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<h2>Dun Forget to Pray</h2>

<div id="remoteWrapper">
  <video id="remoteVideo" autoplay playsinline></video>

  <div id="remotePlaceholder" class="placeholder">
    <img id="remotePlaceholderImg">
  </div>

  <div id="remoteMute" class="mute-indicator">
    <img src="mute.png">
  </div>
</div>

<div id="localWrapper">
  <video id="localVideo" autoplay playsinline muted></video>

  <div id="localPlaceholder" class="placeholder">
    <img id="localPlaceholderImg">
  </div>

  <div id="localMute" class="mute-indicator">
    <img src="mute.png">
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<div id="controls">
  <button id="micBtn" class="control-btn">
    <img src="mic.png">
  </button>

  <button id="camBtn" class="control-btn">
    <img src="cam.png">
  </button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const user = params.get("user") || "pine";
const roomId = params.get("room") || "main";

const remoteUser = user === "pine" ? "precious" : "pine";

const userImages = {
  pine: "pine.jpg",
  precious: "precious.jpg"
};

document.getElementById("localPlaceholderImg").src = userImages[user];
document.getElementById("remotePlaceholderImg").src = userImages[remoteUser];

const socket = io({ query: { roomId } });

let localStream;
let peerConnection;
let videoSender;
let pendingCandidates = [];

let micEnabled = true;
let camEnabled = true;

const config = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    {
      urls: "turn:openrelay.metered.ca:80",
      username: "openrelayproject",
      credential: "openrelayproject"
    }
  ]
};

async function init() {
  if (peerConnection) return;

  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("localVideo").srcObject = localStream;

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    const sender = peerConnection.addTrack(track, localStream);
    if (track.kind === "video") videoSender = sender;
  });

  peerConnection.ontrack = (event) => {
    const stream = event.streams[0];
    document.getElementById("remoteVideo").srcObject = stream;
    document.getElementById("remoteAudio").srcObject = stream;
  };

  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", event.candidate);
    }
  };
}

/* create image stream */
function createImageStream(imageSrc) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = imageSrc;

  canvas.width = 640;
  canvas.height = 480;

  img.onload = () => {
    setInterval(() => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }, 100);
  };

  return canvas.captureStream(10);
}

/* MIC */
document.getElementById("micBtn").onclick = () => {
  if (!localStream) return;

  const track = localStream.getAudioTracks()[0];
  micEnabled = !micEnabled;
  track.enabled = micEnabled;

  document.getElementById("micBtn").classList.toggle("off", !micEnabled);
  document.getElementById("localMute").style.display =
    micEnabled ? "none" : "block";

  socket.emit("mic-status", { micEnabled });
};

socket.on("mic-status", ({ micEnabled }) => {
  document.getElementById("remoteMute").style.display =
    micEnabled ? "none" : "block";
});

/* CAMERA */
document.getElementById("camBtn").onclick = () => {
  if (!localStream || !videoSender) return;

  camEnabled = !camEnabled;

  const localVideo = document.getElementById("localVideo");
  const localPlaceholder = document.getElementById("localPlaceholder");

  document.getElementById("camBtn").classList.toggle("off", !camEnabled);

  if (camEnabled) {
    const realTrack = localStream.getVideoTracks()[0];
    videoSender.replaceTrack(realTrack);

    localVideo.style.opacity = "1";
    localPlaceholder.style.display = "none";
  } else {
    const imgStream = createImageStream(userImages[user]);
    const imgTrack = imgStream.getVideoTracks()[0];
    videoSender.replaceTrack(imgTrack);

    localVideo.style.opacity = "0";
    localPlaceholder.style.display = "flex";
  }

  socket.emit("camera-status", { camEnabled });
};

/* REMOTE CAMERA UI (FIXED) */
socket.on("camera-status", ({ camEnabled }) => {
  const remotePlaceholder = document.getElementById("remotePlaceholder");
  const remoteVideo = document.getElementById("remoteVideo");

  if (camEnabled) {
    remotePlaceholder.style.display = "none";
    remoteVideo.style.display = "block";
    remoteVideo.style.opacity = "1";
  } else {
    remotePlaceholder.style.display = "flex";
    remoteVideo.style.opacity = "0";
  }
});

/* CALL FLOW */
socket.on("connect", async () => {
  await init();
  socket.emit("ready");
});

socket.on("start-call", async () => {
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  socket.emit("offer", offer);
});

socket.on("offer", async (offer) => {
  await init();
  await peerConnection.setRemoteDescription(offer);

  pendingCandidates.forEach(c => peerConnection.addIceCandidate(c));
  pendingCandidates = [];

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  socket.emit("answer", answer);
});

socket.on("answer", async (answer) => {
  await peerConnection.setRemoteDescription(answer);

  pendingCandidates.forEach(c => peerConnection.addIceCandidate(c));
  pendingCandidates = [];
});

socket.on("ice-candidate", async (candidate) => {
  if (peerConnection && peerConnection.remoteDescription) {
    await peerConnection.addIceCandidate(candidate);
  } else {
    pendingCandidates.push(candidate);
  }
});
</script>

</body>
</html>
