<!DOCTYPE html>
<html>
<head>
  <title>Video Call</title>

  <style>
    #localVideo {
      transform: scaleX(-1);
    }

    /* CENTER CONTROLS */
    #controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    /* ROUND BUTTONS */
    .control-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;

      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* IMAGE FILLS BUTTON */
    .control-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .control-btn:hover {
      background: #444;
    }

    /* 🔴 RED OVERLAY WHEN OFF */
    .control-btn.off {
      background: rgba(255, 0, 0, 0.5);
    }

    .control-btn.off img {
      filter: brightness(0.6);
    }
  </style>
</head>

<body>

<h2>Video Call</h2>

<video id="localVideo" autoplay playsinline muted style="width:45%;"></video>
<video id="remoteVideo" autoplay playsinline style="width:45%;"></video>
<audio id="remoteAudio" autoplay></audio>

<br><br>

<!-- CONTROLS -->
<div id="controls">
  <button id="micBtn" class="control-btn">
    <img src="mic.png">
  </button>

  <button id="camBtn" class="control-btn">
    <img src="cam.png">
  </button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const roomId = "main";
const socket = io({ query: { roomId } });

let localStream;
let peerConnection;

let micEnabled = true;
let camEnabled = true;

const config = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

/* INIT MEDIA */
async function init() {
  if (peerConnection) return;

  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("localVideo").srcObject = localStream;

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = (event) => {
    const stream = event.streams[0];
    document.getElementById("remoteVideo").srcObject = stream;
    document.getElementById("remoteAudio").srcObject = stream;
  };

  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", event.candidate);
    }
  };
}

/* MIC BUTTON */
document.getElementById("micBtn").onclick = () => {
  if (!localStream) return;

  const track = localStream.getAudioTracks()[0];
  micEnabled = !micEnabled;

  track.enabled = micEnabled;

  document.getElementById("micBtn")
    .classList.toggle("off", !micEnabled);
};

/* CAMERA BUTTON */
document.getElementById("camBtn").onclick = () => {
  if (!localStream) return;

  const track = localStream.getVideoTracks()[0];
  camEnabled = !camEnabled;

  track.enabled = camEnabled;

  document.getElementById("camBtn")
    .classList.toggle("off", !camEnabled);
};

/* AUTO CALL LOGIC */
socket.on("connect", async () => {
  await init();
  socket.emit("ready");
});

socket.on("start-call", async () => {
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  socket.emit("offer", offer);
});

/* OFFER */
socket.on("offer", async (offer) => {
  await init();

  await peerConnection.setRemoteDescription(offer);

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  socket.emit("answer", answer);
});

/* ANSWER */
socket.on("answer", async (answer) => {
  await peerConnection.setRemoteDescription(answer);
});

/* ICE */
socket.on("ice-candidate", async (candidate) => {
  try {
    await peerConnection.addIceCandidate(candidate);
  } catch (e) {
    console.error(e);
  }
});
</script>

</body>
</html>
