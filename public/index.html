<!DOCTYPE html>
<html>
<head>
  <title>Our Quiet Place</title>

  <style>
    #localVideo {
      transform: scaleX(-1);
    }

    /* WRAPPERS */
    #localWrapper, #remoteWrapper {
      position: relative;
      display: inline-block;
      width: 45%;
    }

    video {
      width: 100%;
    }

    /* PLACEHOLDERS */
    .placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      background: black;
      justify-content: center;
      align-items: center;
    }

    /* ✅ FULL IMAGE (NOT CIRCLE) */
    .placeholder img {
      width: 110%;
      height: 110%;
      object-fit: cover;
    }

    /* 🔇 MUTE INDICATOR (BIGGER, NO BORDER) */
    .mute-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      overflow: hidden;
      display: none;
      background: black;
    }

    /* ONLY ICONS ARE CIRCLES */
    .control-btn img,
    .mute-indicator img {
      width: 110%;
      height: 110%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* CONTROLS */
    #controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .control-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 4px solid white;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* 🟡 OFF STATE */
    .control-btn.off {
      border-color: yellow;
    }
  </style>
</head>

<body>

<h2>Don't Forget to Pray</h2>

<!-- REMOTE -->
<div id="remoteWrapper">
  <video id="remoteVideo" autoplay playsinline></video>

  <div id="remotePlaceholder" class="placeholder">
    <img id="remotePlaceholderImg">
  </div>

  <div id="remoteMute" class="mute-indicator">
    <img src="mute.png">
  </div>
</div>

<!-- LOCAL -->
<div id="localWrapper">
  <video id="localVideo" autoplay playsinline muted></video>

  <div id="localPlaceholder" class="placeholder">
    <img id="localPlaceholderImg">
  </div>

  <div id="localMute" class="mute-indicator">
    <img src="mute.png">
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<!-- CONTROLS -->
<div id="controls">
  <button id="micBtn" class="control-btn">
    <img src="mic.png">
  </button>

  <button id="camBtn" class="control-btn">
    <img src="cam.png">
  </button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const user = params.get("user") || "pine";

/* HARD MAPPING */
const remoteUser = user === "pine" ? "precious" : "pine";

const userImages = {
  pine: "pine.jpg",
  precious: "precious.jpg"
};

document.getElementById("localPlaceholderImg").src = userImages[user];

const socket = io({ query: { roomId: "main" } });

let localStream;
let peerConnection;

let micEnabled = true;
let camEnabled = true;

const config = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

async function init() {
  if (peerConnection) return;

  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("localVideo").srcObject = localStream;

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = (event) => {
    const stream = event.streams[0];
    document.getElementById("remoteVideo").srcObject = stream;
    document.getElementById("remoteAudio").srcObject = stream;
  };

  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", event.candidate);
    }
  };
}

/* MIC */
const localMuteIcon = document.getElementById("localMute");

document.getElementById("micBtn").onclick = () => {
  if (!localStream) return;

  const track = localStream.getAudioTracks()[0];
  micEnabled = !micEnabled;
  track.enabled = micEnabled;

  document.getElementById("micBtn").classList.toggle("off", !micEnabled);
  localMuteIcon.style.display = micEnabled ? "none" : "block";

  socket.emit("mic-status", { micEnabled });
};

socket.on("mic-status", ({ micEnabled }) => {
  document.getElementById("remoteMute").style.display =
    micEnabled ? "none" : "block";
});

/* CAMERA */
const localPlaceholder = document.getElementById("localPlaceholder");

document.getElementById("camBtn").onclick = () => {
  if (!localStream) return;

  const track = localStream.getVideoTracks()[0];
  camEnabled = !camEnabled;

  track.enabled = camEnabled;

  document.getElementById("camBtn").classList.toggle("off", !camEnabled);
  localPlaceholder.style.display = camEnabled ? "none" : "flex";

  socket.emit("camera-status", { camEnabled });
};

socket.on("camera-status", ({ camEnabled }) => {
  const remotePlaceholder = document.getElementById("remotePlaceholder");
  const remoteImg = document.getElementById("remotePlaceholderImg");

  if (!camEnabled) {
    remoteImg.src = userImages[remoteUser];
    remotePlaceholder.style.display = "flex";
  } else {
    remotePlaceholder.style.display = "none";
  }
});

/* CALL */
socket.on("connect", async () => {
  await init();
  socket.emit("ready");
});

socket.on("start-call", async () => {
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  socket.emit("offer", offer);
});

socket.on("offer", async (offer) => {
  await init();
  await peerConnection.setRemoteDescription(offer);

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  socket.emit("answer", answer);
});

socket.on("answer", async (answer) => {
  await peerConnection.setRemoteDescription(answer);
});

socket.on("ice-candidate", async (candidate) => {
  try {
    await peerConnection.addIceCandidate(candidate);
  } catch (e) {
    console.error(e);
  }
});
</script>

</body>
</html>
