<!DOCTYPE html>
<html>
<head>
  <title>Video Call</title>
</head>
<body>

<h2>Video Call</h2>

<video id="localVideo" autoplay playsinline muted style="width:45%;"></video>
<video id="remoteVideo" autoplay playsinline style="width:45%;"></video>
<audio id="remoteAudio" autoplay></audio>

<br><br>

<!-- 🎛️ Controls -->
<button id="micBtn">Mute Mic</button>
<button id="camBtn">Turn Camera Off</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");
const remoteAudio = document.getElementById("remoteAudio");

const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");

let localStream;
let peerConnection;

let micEnabled = true;
let camEnabled = true;

const config = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

async function init() {
  if (peerConnection) return;

  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true
    }
  });

  localVideo.srcObject = localStream;

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = (event) => {
    const stream = event.streams[0];

    remoteVideo.srcObject = stream;
    remoteVideo.volume = 1.0;
    remoteVideo.muted = false;

    remoteAudio.srcObject = stream;
    remoteAudio.volume = 1.0;
  };

  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", event.candidate);
    }
  };
}

/* =========================
   🎤 MIC TOGGLE
========================= */
micBtn.onclick = () => {
  const audioTrack = localStream.getAudioTracks()[0];
  micEnabled = !micEnabled;
  audioTrack.enabled = micEnabled;

  micBtn.innerText = micEnabled ? "Mute Mic" : "Unmute Mic";
};

/* =========================
   🎥 CAMERA TOGGLE
========================= */
camBtn.onclick = () => {
  const videoTrack = localStream.getVideoTracks()[0];
  camEnabled = !camEnabled;
  videoTrack.enabled = camEnabled;

  camBtn.innerText = camEnabled ? "Turn Camera Off" : "Turn Camera On";
};

socket.on("connect", async () => {
  await init();

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  socket.emit("offer", offer);
});

socket.on("offer", async (offer) => {
  await init();

  await peerConnection.setRemoteDescription(offer);

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  socket.emit("answer", answer);
});

socket.on("answer", async (answer) => {
  await peerConnection.setRemoteDescription(answer);
});

socket.on("ice-candidate", async (candidate) => {
  try {
    await peerConnection.addIceCandidate(candidate);
  } catch (e) {
    console.error(e);
  }
});
</script>

</body>
</html>
