<!DOCTYPE html>
<html>
<head>
  <title>Our Quiet Place</title>

  <style>
    #localVideo {
      transform: scaleX(-1);
    }

    /* WRAPPERS */
    #localWrapper, #remoteWrapper {
      position: relative;
      display: inline-block;
      width: 45%;
    }

    video {
      width: 100%;
    }

    /* PLACEHOLDERS */
    .placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      background: black;
      justify-content: center;
      align-items: center;
    }

    .placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* CONTROLS */
    #controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .control-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .control-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .control-btn.off {
      background: rgba(255, 0, 0, 0.5);
    }

    .control-btn.off img {
      filter: brightness(0.6);
    }
  </style>
</head>

<body>

<h2>Don't Forget to Pray</h2>

<!-- REMOTE -->
<div id="remoteWrapper">
  <video id="remoteVideo" autoplay playsinline></video>

  <div id="remotePlaceholder" class="placeholder">
    <img id="remotePlaceholderImg" src="">
  </div>
</div>

<!-- LOCAL -->
<div id="localWrapper">
  <video id="localVideo" autoplay playsinline muted></video>

  <div id="localPlaceholder" class="placeholder">
    <img id="localPlaceholderImg" src="">
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<br><br>

<!-- CONTROLS -->
<div id="controls">
  <button id="micBtn" class="control-btn">
    <img src="mic.png">
  </button>

  <button id="camBtn" class="control-btn">
    <img src="cam.png">
  </button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
/* =========================
   USER IDENTITY
========================= */
const params = new URLSearchParams(window.location.search);
const user = params.get("user") || "pine";

/* ASSIGN IMAGE */
let placeholderImage;

if (user === "pine") {
  placeholderImage = "pine.jpg";
} else if (user === "precious") {
  placeholderImage = "precious.jpg";
} else {
  placeholderImage = "pine.jpg"; // fallback
}

/* SET LOCAL IMAGE */
document.getElementById("localPlaceholderImg").src = placeholderImage;

const roomId = "main";
const socket = io({ query: { roomId } });

let localStream;
let peerConnection;

let micEnabled = true;
let camEnabled = true;

const config = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

/* INIT MEDIA */
async function init() {
  if (peerConnection) return;

  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("localVideo").srcObject = localStream;

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = (event) => {
    const stream = event.streams[0];
    document.getElementById("remoteVideo").srcObject = stream;
    document.getElementById("remoteAudio").srcObject = stream;
  };

  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", event.candidate);
    }
  };
}

/* MIC BUTTON */
document.getElementById("micBtn").onclick = () => {
  if (!localStream) return;

  const track = localStream.getAudioTracks()[0];
  micEnabled = !micEnabled;

  track.enabled = micEnabled;

  document.getElementById("micBtn")
    .classList.toggle("off", !micEnabled);
};

/* CAMERA BUTTON */
const localPlaceholder = document.getElementById("localPlaceholder");

document.getElementById("camBtn").onclick = () => {
  if (!localStream) return;

  const track = localStream.getVideoTracks()[0];
  camEnabled = !camEnabled;

  track.enabled = camEnabled;

  document.getElementById("camBtn")
    .classList.toggle("off", !camEnabled);

  /* LOCAL VIEW */
  localPlaceholder.style.display = camEnabled ? "none" : "flex";

  /* SYNC TO OTHER USER */
  socket.emit("camera-status", {
    camEnabled,
    user
  });
};

/* RECEIVE OTHER USER CAMERA STATUS */
socket.on("camera-status", ({ camEnabled, user }) => {
  const remotePlaceholder = document.getElementById("remotePlaceholder");
  const remoteImg = document.getElementById("remotePlaceholderImg");

  if (!camEnabled) {
    if (user === "pine") {
      remoteImg.src = "pine.jpg";
    } else {
      remoteImg.src = "precious.jpg";
    }
    remotePlaceholder.style.display = "flex";
  } else {
    remotePlaceholder.style.display = "none";
  }
});

/* AUTO CALL LOGIC */
socket.on("connect", async () => {
  await init();
  socket.emit("ready");
});

socket.on("start-call", async () => {
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  socket.emit("offer", offer);
});

/* OFFER */
socket.on("offer", async (offer) => {
  await init();

  await peerConnection.setRemoteDescription(offer);

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  socket.emit("answer", answer);
});

/* ANSWER */
socket.on("answer", async (answer) => {
  await peerConnection.setRemoteDescription(answer);
});

/* ICE */
socket.on("ice-candidate", async (candidate) => {
  try {
    await peerConnection.addIceCandidate(candidate);
  } catch (e) {
    console.error(e);
  }
});
</script>

</body>
</html>
